<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Outbreak: Código Genético</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
  <style>/* ═══════════════════════════════════════════
   OUTBREAK: CÓDIGO GENÉTICO — Stylesheet v2
   ═══════════════════════════════════════════ */

@import url('https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Orbitron:wght@400;700;900&family=Exo+2:ital,wght@0,300;0,400;0,600;1,300&display=swap');

:root {
  --bg:      #020d08;
  --bg2:     #041209;
  --panel:   #071a10;
  --border:  #0f3d1e;
  --glow:    #00ff6a;
  --glow2:   #00c453;
  --glow3:   #00ffc8;
  --red:     #ff2d55;
  --amber:   #ffb700;
  --purple:  #a78bfa;
  --blue:    #60a5fa;
  --text:    #b8ffd0;
  --muted:   #3a6647;
  --white:   #e8fff2;
  --life-active: #00ff6a;
  --life-lost:   #1a3322;
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

html, body {
  background: var(--bg);
  color: var(--text);
  font-family: 'Exo 2', sans-serif;
  height: 100%;
  overflow: hidden;
}

/* ── BACKGROUND EFFECTS ─────────────────── */
.dna-canvas {
  position: fixed; inset: 0;
  opacity: 0.06; pointer-events: none; z-index: 0;
}
.scanlines {
  position: fixed; inset: 0;
  background: repeating-linear-gradient(
    0deg, transparent, transparent 2px,
    rgba(0,0,0,0.12) 2px, rgba(0,0,0,0.12) 4px
  );
  pointer-events: none; z-index: 1;
}
.vignette {
  position: fixed; inset: 0;
  background: radial-gradient(ellipse at center, transparent 55%, rgba(0,0,0,0.7) 100%);
  pointer-events: none; z-index: 1;
}

/* ── MAIN LAYOUT ─────────────────────────── */
.game-root {
  min-height: 100vh;
  display: flex; flex-direction: column; align-items: center;
  position: relative; overflow: hidden;
}
.game-container {
  position: relative; z-index: 2;
  width: 100%; max-width: 860px;
  padding: 0 20px 80px;
  height: 100vh;
  overflow-y: auto;
  display: flex; flex-direction: column; gap: 0;
}
.game-container::-webkit-scrollbar { width: 3px; }
.game-container::-webkit-scrollbar-track { background: transparent; }
.game-container::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

/* ── HUD BAR ─────────────────────────────── */
.hud-bar {
  display: flex; align-items: center; justify-content: space-between;
  border-bottom: 1px solid var(--border);
  padding: 12px 0 10px;
  position: sticky; top: 0; background: var(--bg); z-index: 10;
  margin-bottom: 24px;
}
.hud-title {
  font-family: 'Orbitron', monospace;
  font-size: 20px; font-weight: 900;
  letter-spacing: 3px; color: var(--glow2);
  text-transform: uppercase;
}
.hud-center {
  display: flex; flex-direction: column; align-items: center; gap: 4px;
}
.hud-lives {
  display: flex; gap: 6px; align-items: center;
}
.hud-lives-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; color: var(--muted);
  letter-spacing: 2px; margin-right: 4px;
}
.life-dna {
  width: 18px; height: 22px;
  display: flex; flex-direction: column; align-items: center;
  justify-content: space-around;
  transition: all 0.4s ease;
}
.life-dna .strand {
  width: 100%; height: 3px;
  border-radius: 2px;
  transition: all 0.4s ease;
}
.life-dna.active .strand { background: var(--life-active); box-shadow: 0 0 6px var(--glow); }
.life-dna.active .strand:nth-child(2) { width: 70%; }
.life-dna.active .strand:nth-child(3) { width: 85%; }
.life-dna.lost .strand { background: var(--life-lost); box-shadow: none; }

.hud-score {
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; color: var(--muted); letter-spacing: 2px;
}
.hud-status {
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; color: var(--muted); letter-spacing: 1px;
  text-align: right;
}
.hud-dot {
  display: inline-block; width: 6px; height: 6px;
  border-radius: 50%; background: var(--red);
  margin-right: 5px;
  animation: pulse-red 1.2s ease-in-out infinite;
}
@keyframes pulse-red {
  0%,100% { opacity:1; box-shadow:0 0 0 0 rgba(255,45,85,0.7); }
  50%      { opacity:0.6; box-shadow:0 0 0 5px rgba(255,45,85,0); }
}

/* ── SCENE LABEL ─────────────────────────── */
.scene-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; letter-spacing: 4px;
  color: var(--muted); text-transform: uppercase;
  margin-bottom: 16px;
  animation: fade-in 0.6s ease forwards 0.2s; opacity: 0;
}

/* ── NARRATIVE BOX ───────────────────────── */
.narrative-box {
  background: linear-gradient(135deg,
    rgba(7,26,16,0.96) 0%,
    rgba(2,13,8,0.99) 100%
  );
  border: 1px solid var(--border);
  border-left: 3px solid var(--glow2);
  border-radius: 1px;
  padding: 24px 28px;
  margin-bottom: 16px;
  position: relative;
  box-shadow: 0 0 40px rgba(0,196,83,0.04), inset 0 1px 0 rgba(0,255,106,0.04);
  animation: fade-in 0.4s ease forwards;
}
.narrative-box::before {
  content: '';
  position: absolute; top: 0; left: 0; right: 0; height: 1px;
  background: linear-gradient(90deg, var(--glow2), transparent);
  opacity: 0.35;
}
.char-label {
  font-family: 'Orbitron', monospace;
  font-size: 14px; font-weight: 700;
  letter-spacing: 3px; text-transform: uppercase;
  margin-bottom: 10px; padding-bottom: 7px;
  border-bottom: 1px solid var(--border);
}
.char-player   { color: var(--glow3); }
.char-mentora  { color: var(--amber); }
.char-sistema  { color: var(--purple); }
.char-analista { color: var(--blue); }
.char-director { color: var(--red); }
.char-narrator { color: var(--muted); font-style: italic; }

.narrative-text {
  font-size: 20px; font-weight: 300;
  line-height: 1.85; color: var(--white);
  white-space: pre-wrap;
}
.cursor-blink {
  display: inline-block; width: 8px; height: 15px;
  background: var(--glow); margin-left: 2px;
  vertical-align: text-bottom;
  animation: blink 0.85s step-end infinite;
}
@keyframes blink { 0%,100%{opacity:1;} 50%{opacity:0;} }

/* ── CHOICES ─────────────────────────────── */
.choices-container {
  display: flex; flex-direction: column; gap: 8px;
  margin-top: 6px;
  animation: slide-up 0.4s ease forwards;
}
@keyframes slide-up {
  from { opacity:0; transform:translateY(10px); }
  to   { opacity:1; transform:translateY(0); }
}
.choice-btn {
  background: transparent;
  border: 1px solid var(--border);
  border-left: 3px solid transparent;
  color: var(--text);
  font-family: 'Exo 2', sans-serif;
  font-size: 26px; font-weight: 300;
  text-align: left; padding: 12px 18px;
  cursor: pointer;
  transition: all 0.18s ease;
  line-height: 1.5; letter-spacing: 0.2px;
  position: relative;
}
.choice-btn:hover {
  background: rgba(0,255,106,0.04);
  border-color: var(--glow2);
  border-left-color: var(--glow);
  color: var(--white);
  box-shadow: 0 0 18px rgba(0,255,106,0.07);
  transform: translateX(3px);
}
.choice-btn.danger:hover {
  background: rgba(255,45,85,0.05);
  border-color: var(--red);
  border-left-color: var(--red);
  color: #ffb3c0;
}
.choice-num {
  font-family: 'Share Tech Mono', monospace;
  font-size: 20px; color: var(--glow2);
  margin-right: 12px; opacity: 0.8;
}
.choice-risk {
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; color: var(--red);
  margin-left: 8px; opacity: 0.7;
}

.continue-btn {
  background: transparent;
  border: 1px solid var(--glow2); color: var(--glow);
  font-family: 'Share Tech Mono', monospace;
  font-size: 20px; letter-spacing: 3px; text-transform: uppercase;
  padding: 9px 20px; cursor: pointer;
  transition: all 0.18s ease;
  animation: fade-in 0.4s ease forwards;
}
.continue-btn:hover {
  background: rgba(0,255,106,0.07);
  box-shadow: 0 0 18px rgba(0,255,106,0.18);
  border-color: var(--glow);
}
.continue-wrap { display: flex; justify-content: flex-end; margin-top: 8px; }

/* ── ALERT BARS ──────────────────────────── */
.alert-bar {
  font-family: 'Share Tech Mono', monospace;
  font-size: 16px; letter-spacing: 1.5px;
  padding: 9px 14px; margin-bottom: 14px;
  text-transform: uppercase;
  animation: fade-in 0.3s ease forwards;
}
.alert-danger  { background:rgba(255,45,85,0.07); border:1px solid rgba(255,45,85,0.3); color:var(--red); }
.alert-success { background:rgba(0,255,106,0.05); border:1px solid rgba(0,255,106,0.2); color:var(--glow); }
.alert-info    { background:rgba(96,165,250,0.06); border:1px solid rgba(96,165,250,0.25); color:var(--blue); }
.alert-warn    { background:rgba(255,183,0,0.06); border:1px solid rgba(255,183,0,0.3); color:var(--amber); }

/* ── LIFE LOST FEEDBACK ──────────────────── */
.life-lost-overlay {
  position: fixed; inset: 0; z-index: 200;
  background: rgba(255,45,85,0.08);
  pointer-events: none;
  animation: flash-red 0.5s ease forwards;
}
@keyframes flash-red {
  0%   { opacity:1; }
  100% { opacity:0; }
}
.penalty-box {
  border: 1px solid rgba(255,45,85,0.4);
  background: rgba(255,45,85,0.05);
  padding: 14px 18px; margin-bottom: 14px;
  animation: fade-in 0.3s ease forwards;
}
.penalty-title {
  font-family: 'Orbitron', monospace;
  font-size: 18px; letter-spacing: 3px;
  color: var(--red); margin-bottom: 6px;
}
.penalty-text {
  font-family: 'Exo 2', sans-serif;
  font-size: 24px; font-weight: 300;
  color: #ffb3c0; line-height: 1.6;
}

/* ── GAME OVER SCREEN ────────────────────── */
.game-over-screen {
  position: fixed; inset: 0; z-index: 500;
  background: rgba(2,6,4,0.97);
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  text-align: center; padding: 40px;
  animation: gameover-in 0.8s ease forwards;
}
@keyframes gameover-in {
  from { opacity:0; transform:scale(1.03); }
  to   { opacity:1; transform:scale(1); }
}
.go-glitch {
  font-family: 'Orbitron', monospace;
  font-size: clamp(28px, 6vw, 52px);
  font-weight: 900; color: var(--red);
  letter-spacing: 8px; margin-bottom: 8px;
  text-shadow: 0 0 30px rgba(255,45,85,0.6);
  animation: glitch 2s infinite;
}
@keyframes glitch {
  0%,92%,100% { text-shadow:0 0 30px rgba(255,45,85,0.6); transform:none; }
  93%  { text-shadow:-3px 0 #00ff6a, 3px 0 #ff2d55; transform:translateX(2px); }
  95%  { text-shadow:3px 0 #00ff6a, -3px 0 #ff2d55; transform:translateX(-2px); }
  97%  { text-shadow:-2px 0 #00ff6a, 2px 0 #ff2d55; transform:translateX(1px); }
}
.go-subtitle {
  font-family: 'Share Tech Mono', monospace;
  font-size: 22px; color: var(--muted);
  letter-spacing: 4px; text-transform: uppercase; margin-bottom: 28px;
}
.go-reason-box {
  background: rgba(255,45,85,0.04);
  border: 1px solid rgba(255,45,85,0.2);
  max-width: 520px; padding: 20px 24px;
  margin-bottom: 12px; text-align: left;
}
.go-reason-label {
  font-family: 'Orbitron', monospace;
  font-size: 16px; letter-spacing: 3px;
  color: var(--red); margin-bottom: 8px;
  text-transform: uppercase;
}
.go-reason-text {
  font-family: 'Exo 2', sans-serif;
  font-size: 26px; font-weight: 300;
  color: #cc8892; line-height: 1.7;
}
.go-lesson-box {
  background: rgba(0,196,83,0.03);
  border: 1px solid rgba(0,196,83,0.15);
  max-width: 520px; padding: 16px 24px;
  margin-bottom: 28px; text-align: left;
}
.go-lesson-label {
  font-family: 'Orbitron', monospace;
  font-size: 16px; letter-spacing: 3px;
  color: var(--glow2); margin-bottom: 6px;
  text-transform: uppercase;
}
.go-lesson-text {
  font-family: 'Exo 2', sans-serif;
  font-size: 24px; font-weight: 300;
  color: #7dd4a8; line-height: 1.7;
}
.go-buttons { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
.go-btn {
  background: transparent; cursor: pointer;
  font-family: 'Share Tech Mono', monospace;
  font-size: 20px; letter-spacing: 3px; text-transform: uppercase;
  padding: 11px 24px; transition: all 0.2s ease;
}
.go-btn-retry {
  border: 1px solid var(--red); color: var(--red);
}
.go-btn-retry:hover {
  background: rgba(255,45,85,0.1);
  box-shadow: 0 0 20px rgba(255,45,85,0.2);
}
.go-btn-restart {
  border: 1px solid var(--border); color: var(--muted);
}
.go-btn-restart:hover {
  border-color: var(--muted); color: var(--text);
}

/* ── MINIGAME WRAPPER ────────────────────── */
.minigame-wrapper {
  background: rgba(4,18,9,0.98);
  border: 1px solid var(--border);
  padding: 22px; margin-bottom: 16px;
  animation: fade-in 0.5s ease forwards;
}
.mg-header { margin-bottom: 18px; }
.mg-title {
  font-family: 'Orbitron', monospace;
  font-size: 18px; font-weight: 700;
  letter-spacing: 4px; color: var(--glow2);
  text-transform: uppercase; margin-bottom: 4px;
}
.mg-subtitle {
  font-family: 'Share Tech Mono', monospace;
  font-size: 20px; color: var(--muted); letter-spacing: 0.5px;
}
.mg-lives-warning {
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; color: var(--red); letter-spacing: 1px;
  margin-top: 4px; opacity: 0.8;
}
.mg-section-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; letter-spacing: 2px;
  color: var(--muted); text-transform: uppercase;
  margin-bottom: 8px; margin-top: 16px;
}

/* ── ACTION BUTTONS ──────────────────────── */
.action-btn {
  background: transparent;
  border: 1px solid var(--glow2); color: var(--glow);
  font-family: 'Share Tech Mono', monospace;
  font-size: 20px; letter-spacing: 3px; text-transform: uppercase;
  padding: 10px 22px; cursor: pointer;
  transition: all 0.18s ease; margin-top: 10px;
}
.action-btn:hover:not(:disabled) {
  background: rgba(0,255,106,0.07);
  box-shadow: 0 0 18px rgba(0,255,106,0.2);
}
.action-btn:disabled { opacity: 0.35; cursor: not-allowed; }

/* ── BLAST MINIGAME ──────────────────────── */
.blast-query {
  background: rgba(2,13,8,0.9);
  border: 1px solid var(--border);
  padding: 12px 16px; margin-bottom: 14px;
}
.blast-query-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; color: var(--muted);
  letter-spacing: 2px; margin-bottom: 6px; text-transform: uppercase;
}
.blast-seq {
  font-family: 'Share Tech Mono', monospace;
  font-size: 24px; letter-spacing: 2px;
  line-height: 1.8; word-break: break-all;
}
.blast-hits { display: flex; flex-direction: column; gap: 10px; margin-bottom: 16px; }
.blast-hit {
  border: 1px solid var(--border);
  padding: 12px 16px; cursor: pointer;
  transition: all 0.18s ease;
  background: rgba(2,13,8,0.6);
}
.blast-hit:hover { border-color: var(--glow2); background: rgba(0,255,106,0.03); }
.blast-hit.selected { border-color: var(--glow); background: rgba(0,255,106,0.06); box-shadow: 0 0 12px rgba(0,255,106,0.1); }
.blast-hit.correct  { border-color: var(--glow); background: rgba(0,255,106,0.07); }
.blast-hit.wrong    { border-color: var(--red); background: rgba(255,45,85,0.05); }
.hit-meta {
  display: flex; gap: 16px; align-items: center;
  margin-bottom: 8px; flex-wrap: wrap;
}
.hit-org {
  font-family: 'Share Tech Mono', monospace;
  font-size: 16px; color: var(--glow3); letter-spacing: 1px;
}
.hit-score {
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; color: var(--muted);
}
.hit-score span { color: var(--amber); }
.hit-alignment { font-family: 'Share Tech Mono', monospace; font-size: 22px; line-height: 2; letter-spacing: 1px; }
.align-match    { color: var(--glow); }
.align-mismatch { color: var(--red); font-weight: 700; text-decoration: underline; }
.align-gap      { color: var(--purple); font-weight: 700; }

/* ── CODON MINIGAME ──────────────────────── */
.codon-table {
  display: grid;
  grid-template-columns: repeat(4, 1fr);
  gap: 1px; background: var(--border);
  border: 1px solid var(--border);
  margin-bottom: 16px; font-size: 20px;
}
.codon-cell {
  background: rgba(2,13,8,0.95);
  padding: 5px 4px; text-align: center;
  font-family: 'Share Tech Mono', monospace;
}
.codon-cell.header {
  color: var(--glow2); font-size: 18px;
  letter-spacing: 1px; background: rgba(7,26,16,0.9);
  padding: 6px 4px;
}
.codon-code { color: var(--amber); font-size: 20px; }
.codon-aa   { color: var(--text); font-size: 18px; margin-top: 1px; }
.codon-stop { color: var(--red); }

.mrna-display {
  display: flex; flex-wrap: wrap; gap: 4px;
  margin-bottom: 14px;
}
.codon-triplet {
  background: rgba(7,26,16,0.8);
  border: 1px solid var(--border);
  padding: 6px 10px; cursor: pointer;
  transition: all 0.18s ease;
  font-family: 'Share Tech Mono', monospace;
  font-size: 24px; letter-spacing: 2px;
  display: flex; flex-direction: column; align-items: center; gap: 2px;
}
.codon-triplet:hover { border-color: var(--glow2); background: rgba(0,255,106,0.05); }
.codon-triplet.selected  { border-color: var(--amber); background: rgba(255,183,0,0.07); }
.codon-triplet.correct   { border-color: var(--glow); background: rgba(0,255,106,0.1); }
.codon-triplet.wrong     { border-color: var(--red); background: rgba(255,45,85,0.08); }
.codon-triplet.stop      { color: var(--red); }
.codon-aa-label {
  font-size: 16px; color: var(--muted); letter-spacing: 1px;
}

/* ── PHYLOGENETIC TREE ───────────────────── */
.phylo-container { overflow-x: auto; margin-bottom: 16px; }
.phylo-svg { min-width: 500px; }
.phylo-node {
  cursor: pointer;
  transition: all 0.18s ease;
}
.phylo-node circle {
  fill: rgba(7,26,16,0.9);
  stroke: var(--border); stroke-width: 1.5;
  transition: all 0.18s ease;
}
.phylo-node:hover circle, .phylo-node.hover circle { stroke: var(--glow2); fill: rgba(0,255,106,0.08); }
.phylo-node.selected circle  { stroke: var(--amber); fill: rgba(255,183,0,0.1); }
.phylo-node.correct circle   { stroke: var(--glow); fill: rgba(0,255,106,0.15); }
.phylo-node.wrong circle     { stroke: var(--red); fill: rgba(255,45,85,0.1); }
.phylo-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 20px; fill: var(--text); letter-spacing: 0.5px;
}
.phylo-branch { stroke: var(--border); stroke-width: 1; fill: none; }
.phylo-distance { font-family: 'Share Tech Mono', monospace; font-size: 16px; fill: var(--muted); }
.phylo-unknown-label { font-family: 'Orbitron', monospace; font-size: 18px; fill: var(--purple); }

.distance-matrix {
  border: 1px solid var(--border); margin-bottom: 14px;
  overflow-x: auto;
}
.distance-matrix table {
  border-collapse: collapse; width: 100%;
  font-family: 'Share Tech Mono', monospace; font-size: 20px;
}
.distance-matrix th {
  padding: 6px 10px; color: var(--glow2);
  border: 1px solid var(--border);
  background: rgba(7,26,16,0.9);
  font-size: 18px; letter-spacing: 1px; text-align: center;
}
.distance-matrix td {
  padding: 5px 10px; color: var(--text);
  border: 1px solid var(--border);
  text-align: center; background: rgba(2,13,8,0.7);
}
.distance-matrix td.low  { color: var(--glow); }
.distance-matrix td.high { color: var(--red); }
.distance-matrix td.self { color: var(--muted); }

/* ── MUTATION CLASSIFICATION ─────────────── */
.mut-pair {
  border: 1px solid var(--border);
  padding: 14px 16px; margin-bottom: 10px;
  background: rgba(2,13,8,0.7);
  transition: border-color 0.2s ease;
}
.mut-pair.answered-correct { border-color: var(--glow2); }
.mut-pair.answered-wrong   { border-color: var(--red); }
.mut-pair-label {
  font-family: 'Orbitron', monospace;
  font-size: 16px; letter-spacing: 3px;
  color: var(--muted); margin-bottom: 10px; text-transform: uppercase;
}
.mut-seqs { margin-bottom: 10px; }
.mut-seq-row {
  display: flex; gap: 10px; align-items: center;
  margin-bottom: 4px;
}
.mut-seq-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; color: var(--muted);
  width: 40px; text-align: right; flex-shrink: 0;
}
.mut-seq-bases {
  font-family: 'Share Tech Mono', monospace;
  font-size: 24px; letter-spacing: 2px;
  word-break: break-all; line-height: 1.6;
}
.base-ref { color: var(--text); }
.base-changed { color: var(--red); font-weight: 700; text-decoration: underline; }
.base-inserted { color: var(--purple); font-weight: 700; }
.base-deleted-marker { color: var(--amber); font-weight: 700; }

.mut-options { display: flex; flex-wrap: wrap; gap: 6px; }
.mut-opt {
  background: transparent;
  border: 1px solid var(--border);
  color: var(--text); cursor: pointer;
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; letter-spacing: 1.5px; text-transform: uppercase;
  padding: 5px 12px; transition: all 0.15s ease;
}
.mut-opt:hover:not(:disabled) { border-color: var(--glow2); color: var(--glow); }
.mut-opt.selected  { border-color: var(--amber); color: var(--amber); background: rgba(255,183,0,0.06); }
.mut-opt.correct   { border-color: var(--glow); color: var(--glow); background: rgba(0,255,106,0.08); }
.mut-opt.wrong     { border-color: var(--red); color: var(--red); background: rgba(255,45,85,0.06); }
.mut-opt:disabled  { cursor: default; }

/* ── DECISION PANEL ──────────────────────── */
.decision-panel {
  border: 1px solid var(--amber);
  background: rgba(255,183,0,0.02);
  padding: 18px 22px; margin-bottom: 16px;
  position: relative;
  animation: fade-in 0.5s ease forwards;
}
.decision-panel::before {
  content: '⚠ DECISIÓN CRÍTICA';
  font-family: 'Orbitron', monospace;
  font-size: 16px; letter-spacing: 4px; color: var(--amber);
  position: absolute; top: -8px; left: 14px;
  background: var(--bg); padding: 0 8px;
}
.decision-btn {
  width: 100%; background: transparent;
  border: 1px solid rgba(255,183,0,0.25);
  color: var(--white);
  font-family: 'Exo 2', sans-serif;
  font-size: 26px; font-weight: 300;
  text-align: left; padding: 13px 16px;
  cursor: pointer; margin-bottom: 7px;
  transition: all 0.18s ease; line-height: 1.5;
}
.decision-btn:hover {
  background: rgba(255,183,0,0.06);
  border-color: var(--amber); color: var(--amber);
  transform: translateX(3px);
}

/* ── ENDINGS ─────────────────────────────── */
.ending-screen {
  text-align: center; padding: 40px 20px;
  animation: fade-in 1s ease forwards;
}
.ending-title {
  font-family: 'Orbitron', monospace;
  font-size: clamp(16px, 4vw, 24px);
  font-weight: 900; color: var(--glow);
  letter-spacing: 6px; margin-bottom: 10px;
  text-shadow: 0 0 30px rgba(0,255,106,0.4);
}
.ending-subtitle {
  font-family: 'Share Tech Mono', monospace;
  font-size: 22px; color: var(--muted);
  letter-spacing: 3px; margin-bottom: 28px;
}
.ending-quote {
  font-family: 'Exo 2', sans-serif;
  font-size: 30px; font-style: italic; font-weight: 300;
  color: var(--text); line-height: 1.9;
  max-width: 520px; margin: 0 auto 24px;
  border-left: 3px solid var(--glow2);
  padding-left: 18px; text-align: left;
  white-space: pre-line;
}
.ending-score {
  font-family: 'Share Tech Mono', monospace;
  font-size: 24px; color: var(--amber);
  letter-spacing: 2px; margin-bottom: 24px;
}
.restart-btn {
  background: transparent;
  border: 1px solid var(--glow2); color: var(--glow);
  font-family: 'Share Tech Mono', monospace;
  font-size: 20px; letter-spacing: 4px; text-transform: uppercase;
  padding: 11px 26px; cursor: pointer;
  transition: all 0.18s ease; margin: 6px;
}
.restart-btn:hover {
  background: rgba(0,255,106,0.07);
  box-shadow: 0 0 28px rgba(0,255,106,0.2);
}

/* ── POST CREDITS ────────────────────────── */
.post-credits {
  position: fixed; inset: 0;
  background: #000;
  display: flex; align-items: center; justify-content: center;
  z-index: 600;
  animation: fade-in 2.5s ease forwards;
}
.post-credits-text {
  font-family: 'Share Tech Mono', monospace;
  font-size: 26px; color: var(--glow);
  letter-spacing: 2px; text-align: center; line-height: 2.4;
  animation: glow-text 2s ease-in-out infinite;
}
@keyframes glow-text {
  0%,100% { text-shadow:0 0 10px rgba(0,255,106,0.8); }
  50%      { text-shadow:0 0 30px rgba(0,255,106,1),0 0 60px rgba(0,255,106,0.4); }
}

/* ── DNA BASE COLORS ─────────────────────── */
.base-A { color: #00ff6a; }
.base-T { color: #ff2d55; }
.base-G { color: #60a5fa; }
.base-C { color: #ffb700; }
.base-X { color: var(--purple); font-weight: 700; animation: glow-purple 1s ease-in-out infinite; }
.base-gap { color: var(--muted); }
@keyframes glow-purple {
  0%,100% { text-shadow:0 0 4px #a78bfa; }
  50%      { text-shadow:0 0 12px #a78bfa, 0 0 20px #7c3aed; }
}

/* ── UTILITIES ───────────────────────────── */
@keyframes fade-in { from{opacity:0;} to{opacity:1;} }
@keyframes shake {
  0%,100% { transform:translateX(0); }
  20%     { transform:translateX(-6px); }
  40%     { transform:translateX(6px); }
  60%     { transform:translateX(-4px); }
  80%     { transform:translateX(4px); }
}
.shake { animation: shake 0.4s ease; }

.progress-bar-wrap {
  height: 3px; background: rgba(255,255,255,0.04);
  border-radius: 2px; margin-bottom: 14px; overflow: hidden;
}
.progress-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, var(--glow2), var(--glow3));
  border-radius: 2px; transition: width 0.5s ease;
  box-shadow: 0 0 7px rgba(0,255,106,0.5);
}

/* ── RESPONSIVE ──────────────────────────── */
@media (max-width: 600px) {
  .codon-table { grid-template-columns: repeat(2,1fr); }
  .hit-meta { flex-direction: column; align-items: flex-start; gap: 4px; }
  .go-glitch { font-size: 28px; letter-spacing: 4px; }
}

/* ═══════════════════════════════════════════
   PASO 2 ADDITIONS — v3 styles
   ═══════════════════════════════════════════ */

/* ── HINT SYSTEM ─────────────────────────── */
.hint-btn {
  background: transparent;
  border: 1px solid rgba(255,183,0,0.3);
  color: var(--amber);
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; letter-spacing: 2px;
  padding: 5px 14px; cursor: pointer;
  transition: all 0.18s ease;
}
.hint-btn:hover:not(:disabled) {
  background: rgba(255,183,0,0.07);
  border-color: var(--amber);
}
.hint-btn:disabled { opacity: 0.45; cursor: default; }
.hint-box {
  background: rgba(255,183,0,0.04);
  border: 1px solid rgba(255,183,0,0.2);
  border-left: 3px solid var(--amber);
  padding: 10px 14px; margin-top: 8px;
  font-family: 'Exo 2', sans-serif;
  font-size: 24px; font-weight: 300;
  color: #e0c882; line-height: 1.6;
  animation: fade-in 0.3s ease forwards;
}

/* ── TIMER ───────────────────────────────── */
.timer-wrap {
  display: flex; align-items: center; gap: 12px;
  margin-bottom: 14px; padding: 10px 14px;
  background: rgba(255,45,85,0.04);
  border: 1px solid rgba(255,45,85,0.2);
}
.timer-label {
  font-family: 'Orbitron', monospace;
  font-size: 28px; font-weight: 700;
  letter-spacing: 2px; min-width: 60px;
  transition: color 0.5s ease;
}
.timer-bar-bg {
  flex: 1; height: 4px;
  background: rgba(255,255,255,0.05);
  border-radius: 2px; overflow: hidden;
}
.timer-bar-fill {
  height: 100%; border-radius: 2px;
  transition: width 1s linear, background 0.5s ease;
  box-shadow: 0 0 6px currentColor;
}

/* ── SCORE TOAST ─────────────────────────── */
.toast-container {
  position: fixed; top: 70px; right: 20px;
  z-index: 300; display: flex;
  flex-direction: column; gap: 6px;
  pointer-events: none;
}
.score-toast {
  font-family: 'Share Tech Mono', monospace;
  font-size: 22px; letter-spacing: 2px;
  color: var(--glow);
  background: rgba(0,196,83,0.08);
  border: 1px solid rgba(0,196,83,0.25);
  padding: 6px 14px;
  animation: toast-anim 2s ease forwards;
}
@keyframes toast-anim {
  0%   { opacity:0; transform:translateX(12px); }
  15%  { opacity:1; transform:translateX(0); }
  75%  { opacity:1; }
  100% { opacity:0; transform:translateY(-8px); }
}

/* ── SEQ DIFF COLORS ─────────────────────── */
.diff-ref-changed  { color: var(--amber); font-weight: 700; text-decoration: underline; }
.diff-mut-changed  { color: var(--red); font-weight: 700; text-decoration: underline; }
.diff-deleted      { color: var(--amber); font-weight: 700; text-decoration: line-through; }
.diff-gap          { color: var(--muted); }
.base-inserted     { color: var(--purple); font-weight: 700; }

.seq-diff-block {
  background: rgba(2,13,8,0.8);
  border: 1px solid var(--border);
  padding: 10px 14px; margin: 8px 0;
}
.seq-diff-row {
  display: flex; align-items: flex-start;
  gap: 10px; margin-bottom: 4px;
}
.seq-diff-tag {
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px; color: var(--muted);
  letter-spacing: 1px; width: 36px;
  flex-shrink: 0; padding-top: 1px;
}
.seq-diff-bases {
  font-family: 'Share Tech Mono', monospace;
  font-size: 12px; letter-spacing: 2px;
  line-height: 1.6; word-break: break-all;
}

/* ── BLAST IMPROVEMENTS ──────────────────── */
.blast-legend {
  display: flex; flex-wrap: wrap; gap: 12px;
  margin-bottom: 12px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; color: var(--muted); letter-spacing: 0.5px;
}
.blast-legend span { display: flex; align-items: center; gap: 4px; }
.hit-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 14px; padding: 2px 7px;
  border-radius: 2px; letter-spacing: 0.5px;
}
.hit-badge.evalue   { background:rgba(255,183,0,0.08); border:1px solid rgba(255,183,0,0.3); color:var(--amber); }
.hit-badge.identity { background:rgba(0,255,200,0.06); border:1px solid rgba(0,255,200,0.2); color:var(--glow3); }
.hit-badge.score    { background:rgba(167,139,250,0.07); border:1px solid rgba(167,139,250,0.25); color:var(--purple); }
.hit-explanation {
  margin-top:8px; font-family:'Exo 2',sans-serif;
  font-size: 14px; line-height:1.5;
}
.align-identity-bar {
  margin-top:6px; margin-bottom:2px;
  display:flex; align-items:center;
  flex-wrap:wrap; gap:1px;
}

/* ── CODON GAME IMPROVEMENTS ─────────────── */
.codon-grid-compact {
  border: 1px solid var(--border);
  margin-bottom: 14px; overflow-x: auto;
}
.codon-grid-row {
  display: flex; border-bottom: 1px solid rgba(15,61,30,0.4);
}
.codon-grid-row:last-child { border-bottom: none; }
.cgc-pair {
  display: flex; gap: 4px; align-items: center;
  padding: 4px 10px; flex: 1; min-width: 80px;
  border-right: 1px solid rgba(15,61,30,0.4);
}
.cgc-pair:last-child { border-right: none; }
.cgc-pair.stop-pair .cgc-codon { color: var(--red); }
.cgc-pair.stop-pair .cgc-aa    { color: var(--red); }
.cgc-codon {
  font-family: 'Share Tech Mono', monospace;
  font-size: 20px; color: var(--amber); letter-spacing: 1px;
}
.cgc-aa {
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; color: var(--muted);
}

.mrna-compare { margin-bottom: 14px; }
.mrna-row {
  display: flex; align-items: center;
  flex-wrap: wrap; gap: 4px; margin-bottom: 6px;
}
.mrna-row-label {
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; color: var(--muted);
  letter-spacing: 2px; width: 68px; flex-shrink: 0;
}
.mrna-codon-chip {
  font-family: 'Share Tech Mono', monospace;
  font-size: 22px; letter-spacing: 2px;
  padding: 4px 8px;
  background: rgba(7,26,16,0.8);
  border: 1px solid var(--border);
  color: var(--text); position: relative;
}
.mrna-codon-chip.mutated {
  border-color: var(--red); color: var(--red);
  background: rgba(255,45,85,0.06);
}
.mutation-marker {
  position: absolute; bottom: -12px; left: 50%;
  transform: translateX(-50%);
  font-size: 16px; color: var(--red);
}

/* Protein chain animation */
.protein-chain {
  display: flex; align-items: center;
  flex-wrap: wrap; gap: 2px;
  margin-bottom: 6px; min-height: 54px;
}
.aa-bead {
  display: flex; flex-direction: column;
  align-items: center; position: relative;
  animation: bead-in 0.3s ease forwards;
}
@keyframes bead-in {
  from { opacity:0; transform:scale(0.6) translateY(-4px); }
  to   { opacity:1; transform:scale(1) translateY(0); }
}
.aa-bead.hidden-bead { opacity: 0; }
.aa-codon {
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; color: var(--amber); letter-spacing: 1px;
  margin-bottom: 2px;
}
.aa-name {
  font-family: 'Share Tech Mono', monospace;
  font-size: 16px; color: var(--glow);
  background: rgba(7,26,16,0.9);
  border: 1px solid var(--border);
  padding: 3px 6px; letter-spacing: 0.5px;
}
.aa-bead.stop-bead .aa-name { color: var(--red); border-color: rgba(255,45,85,0.4); }
.aa-link {
  width: 8px; height: 2px;
  background: var(--border);
  position: absolute; right: -5px; top: 50%;
}
.protein-summary {
  font-family: 'Share Tech Mono', monospace;
  font-size: 20px; color: var(--muted);
  margin-bottom: 14px; letter-spacing: 0.5px;
}

.codon-selector {
  display: flex; flex-wrap: wrap; gap: 6px;
  margin-bottom: 12px;
}
.codon-select-btn {
  display: flex; flex-direction: column;
  align-items: center; gap: 2px;
  padding: 8px 12px; cursor: pointer;
  background: rgba(7,26,16,0.8);
  border: 1px solid var(--border);
  transition: all 0.15s ease; min-width: 62px;
}
.codon-select-btn:hover:not(:disabled) {
  border-color: var(--glow2); background: rgba(0,255,106,0.05);
}
.codon-select-btn.is-stop { border-color: rgba(255,45,85,0.3); }
.codon-select-btn.selected  { border-color: var(--amber); background: rgba(255,183,0,0.07); }
.codon-select-btn.correct   { border-color: var(--glow); background: rgba(0,255,106,0.1); }
.codon-select-btn.wrong     { border-color: var(--red); background: rgba(255,45,85,0.08); }
.cs-codon {
  font-family: 'Share Tech Mono', monospace;
  font-size: 24px; letter-spacing: 2px; color: var(--text);
}
.codon-select-btn.is-stop .cs-codon { color: var(--red); }
.cs-aa  { font-family: 'Share Tech Mono', monospace; font-size: 18px; color: var(--muted); }
.cs-pos { font-family: 'Share Tech Mono', monospace; font-size: 16px; color: rgba(58,102,71,0.6); }

/* ── PHYLO IMPROVEMENTS ──────────────────── */
.dm-legend {
  display: flex; gap: 16px; flex-wrap: wrap;
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; margin-bottom: 14px; letter-spacing: 0.5px;
}
.dm-row-header {
  padding: 5px 10px; color: var(--glow2);
  border-right: 1px solid var(--border);
  background: rgba(7,26,16,0.9);
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; letter-spacing: 0.5px;
  text-align: left; white-space: nowrap;
  font-weight: 400;
}
.cg-row td, .cg-row .dm-row-header {
  background: rgba(0,196,83,0.04) !important;
}
.dm-self     { color: var(--muted); }
.dm-low      { color: var(--glow); font-weight: 600; }
.dm-high     { color: var(--red); }
.dm-highlight { background: rgba(255,183,0,0.06) !important; }

/* ── MUTATION GAME IMPROVEMENTS ──────────── */
.mut-legend {
  display: flex; flex-wrap: wrap; gap: 12px;
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; color: var(--muted);
  margin-bottom: 14px; letter-spacing: 0.5px;
  padding: 8px 12px;
  background: rgba(7,26,16,0.6);
  border: 1px solid var(--border);
}
.mut-legend span { display: flex; align-items: center; gap: 5px; }
.mut-pair-header {
  display: flex; align-items: center;
  justify-content: space-between; margin-bottom: 6px;
}
.mut-result-badge {
  font-family: 'Share Tech Mono', monospace;
  font-size: 18px; letter-spacing: 2px;
  padding: 2px 8px;
}
.mut-result-badge.badge-ok  { color: var(--glow); border: 1px solid rgba(0,255,106,0.3); }
.mut-result-badge.badge-err { color: var(--red);  border: 1px solid rgba(255,45,85,0.3); }
.mut-context {
  font-family: 'Exo 2', sans-serif;
  font-size: 22px; font-weight: 300;
  color: var(--muted); margin-bottom: 8px;
  font-style: italic;
}
.active-pair {
  border-color: rgba(0,196,83,0.3) !important;
  box-shadow: 0 0 12px rgba(0,196,83,0.06);
}
.mg-explanation {
  margin-top: 8px; font-family: 'Exo 2', sans-serif;
  font-size: 22px; line-height: 1.5; padding: 8px 12px;
  border-left: 3px solid;
}
.mg-explanation.ok  { color: var(--glow);  border-left-color: var(--glow2); background: rgba(0,255,106,0.03); }
.mg-explanation.err { color: #ffb3c0; border-left-color: var(--red);  background: rgba(255,45,85,0.03); }

/* ── CHOICE STATES ───────────────────────── */
.choice-btn.correct { border-left-color: var(--glow) !important; border-color: var(--glow2); color: var(--glow); }
.choice-btn.wrong   { border-left-color: var(--red) !important; border-color: var(--red); color: #ffb3c0; }
.choice-btn.selected { border-left-color: var(--amber); color: var(--amber); }

.narrative-box.has-portrait{display:flex;gap:12px;align-items:flex-start;}
.portrait-wrap{flex-shrink:0;width:38px;height:48px;}
.portrait-wrap svg{width:38px;height:48px;display:block;}
.narrative-content{flex:1;min-width:0;}
.has-portrait:has(.char-mentora) .portrait-wrap{filter:drop-shadow(0 0 5px #ffb700);}
.has-portrait:has(.char-analista) .portrait-wrap{filter:drop-shadow(0 0 5px #60a5fa);}
.has-portrait:has(.char-director) .portrait-wrap{filter:drop-shadow(0 0 5px #ff2d55);}
.has-portrait:has(.char-sistema) .portrait-wrap{filter:drop-shadow(0 0 5px #a78bfa);}
.has-portrait:has(.char-player) .portrait-wrap{filter:drop-shadow(0 0 5px #00ffc8);}
.splash-root{position:fixed;inset:0;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:200;gap:0;}
.splash-center{display:flex;flex-direction:column;align-items:center;gap:16px;padding:20px;text-align:center;}
.ecg-svg{width:280px;height:44px;overflow:visible;}
.ecg-line{stroke-dasharray:700;stroke-dashoffset:700;animation:ecg-draw 1.8s ease forwards;}
@keyframes ecg-draw{to{stroke-dashoffset:0}}
.splash-title{font-family:'Orbitron',monospace;font-size:32px;font-weight:900;color:#00ff6a;letter-spacing:8px;text-shadow:0 0 40px rgba(0,255,106,.6);animation:fade-in 1s ease forwards .4s;opacity:0;}
.splash-sub{font-family:'Share Tech Mono',monospace;font-size: 20px;color:#3a6647;letter-spacing:5px;animation:fade-in 1s ease forwards .7s;opacity:0;}
.splash-tag{font-family:'Exo 2',sans-serif;font-size: 14px;font-weight:300;color:#4a8a60;line-height:1.8;max-width:340px;border-left:2px solid #0f3d1e;padding-left:14px;text-align:left;animation:fade-in 1s ease forwards 1.1s;opacity:0;}
.splash-btn{background:transparent;border:1px solid #00c453;color:#00ff6a;font-family:'Orbitron',monospace;font-size: 12px;letter-spacing:4px;padding:14px 32px;cursor:pointer;transition:all .3s;animation:fade-in .5s ease forwards;}
.splash-btn:hover{background:rgba(0,255,106,.08);letter-spacing:6px;box-shadow:0 0 30px rgba(0,255,106,.3);}
.splash-footer{position:absolute;bottom:20px;font-family:'Share Tech Mono',monospace;font-size: 18px;color:#1a3a22;letter-spacing:3px;}
.mute-btn{background:transparent;border:1px solid var(--border);color:var(--muted);font-family:'Share Tech Mono',monospace;font-size: 20px;letter-spacing:1px;padding:4px 10px;cursor:pointer;transition:all .2s;}

  <script>/* OUTBREAK — Web Audio Engine */
window.AudioEngine = (function() {
  let ctx = null;
  let masterGain = null;
  let ambientNode = null;
  let ambientRunning = false;
  let enabled = true;

  function init() {
    if (ctx) return;
    try {
      ctx = new (window.AudioContext || window.webkitAudioContext)();
      masterGain = ctx.createGain();
      masterGain.gain.value = 0.55;
      masterGain.connect(ctx.destination);
    } catch(e) { enabled = false; }
  }

  function resume() {
    if (ctx && ctx.state === 'suspended') ctx.resume();
  }

  /* ── low-level helpers ── */
  function osc(freq, type, dur, vol, startTime, endFreq) {
    if (!enabled || !ctx) return;
    const g = ctx.createGain();
    g.connect(masterGain);
    const o = ctx.createOscillator();
    o.type = type || 'sine';
    o.frequency.setValueAtTime(freq, startTime);
    if (endFreq) o.frequency.linearRampToValueAtTime(endFreq, startTime + dur);
    g.gain.setValueAtTime(0, startTime);
    g.gain.linearRampToValueAtTime(vol, startTime + 0.01);
    g.gain.exponentialRampToValueAtTime(0.0001, startTime + dur);
    o.connect(g);
    o.start(startTime);
    o.stop(startTime + dur + 0.05);
  }

  function noise(dur, vol, startTime, filterFreq) {
    if (!enabled || !ctx) return;
    const bufSize = ctx.sampleRate * dur;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass';
    filter.frequency.value = filterFreq || 800;
    filter.Q.value = 0.5;
    const g = ctx.createGain();
    g.gain.setValueAtTime(vol, startTime);
    g.gain.exponentialRampToValueAtTime(0.0001, startTime + dur);
    src.connect(filter);
    filter.connect(g);
    g.connect(masterGain);
    src.start(startTime);
    src.stop(startTime + dur + 0.05);
  }

  /* ── SOUND LIBRARY ── */
  const sounds = {

    // Typewriter key click
    keyClick: function() {
      init(); resume();
      const t = ctx.currentTime;
      noise(0.04, 0.06, t, 3000);
      osc(1200, 'square', 0.03, 0.04, t);
    },

    // Scene transition — digital whoosh
    sceneTransition: function() {
      init(); resume();
      const t = ctx.currentTime;
      osc(80, 'sawtooth', 0.4, 0.12, t, 40);
      osc(320, 'sine', 0.3, 0.08, t + 0.1, 180);
      noise(0.25, 0.05, t + 0.05, 600);
      osc(1800, 'sine', 0.15, 0.06, t + 0.2, 900);
    },

    // Alert — danger
    heartbeat: function() {
      init(); resume();
      const t = ctx.currentTime;
      osc(880, 'sine', 0.18, 0.06, t);
      osc(880, 'sine', 0.10, 0.04, t + 0.08);
    },

    alertDanger: function() {
      init(); resume();
      const t = ctx.currentTime;
      for (let i = 0; i < 3; i++) {
        osc(880, 'square', 0.12, 0.15, t + i * 0.18);
        osc(660, 'square', 0.08, 0.10, t + i * 0.18 + 0.06);
      }
      noise(0.4, 0.04, t, 400);
    },

    // Alert — info / success
    alertInfo: function() {
      init(); resume();
      const t = ctx.currentTime;
      osc(523, 'sine', 0.12, 0.10, t);
      osc(659, 'sine', 0.12, 0.10, t + 0.08);
      osc(784, 'sine', 0.18, 0.12, t + 0.16);
    },

    // Choice selected
    choiceSelect: function() {
      init(); resume();
      const t = ctx.currentTime;
      osc(440, 'triangle', 0.08, 0.09, t);
      osc(554, 'triangle', 0.10, 0.09, t + 0.05);
    },

    // Wrong answer — penalty
    wrongAnswer: function() {
      init(); resume();
      const t = ctx.currentTime;
      osc(220, 'sawtooth', 0.3, 0.18, t, 120);
      osc(180, 'sawtooth', 0.25, 0.14, t + 0.1, 100);
      noise(0.2, 0.07, t, 250);
    },

    // Correct answer
    correctAnswer: function() {
      init(); resume();
      const t = ctx.currentTime;
      osc(523, 'sine', 0.1, 0.10, t);
      osc(659, 'sine', 0.1, 0.10, t + 0.07);
      osc(1047,'sine', 0.2, 0.12, t + 0.14);
      osc(1319,'sine', 0.15, 0.08, t + 0.26);
    },

    // Life lost — DNA strand break
    lifeLost: function() {
      init(); resume();
      const t = ctx.currentTime;
      osc(400, 'sawtooth', 0.5, 0.20, t, 60);
      noise(0.3, 0.10, t + 0.1, 300);
      osc(120, 'sine', 0.6, 0.15, t + 0.2, 60);
    },

    // Game over
    gameOver: function() {
      init(); resume();
      const t = ctx.currentTime;
      const freqs = [440, 392, 349, 311, 277, 220];
      freqs.forEach((f, i) => {
        osc(f, 'sawtooth', 0.35, 0.15 - i*0.015, t + i * 0.22);
      });
      noise(1.5, 0.06, t + 0.5, 200);
    },

    // Minigame complete
    minigameComplete: function() {
      init(); resume();
      const t = ctx.currentTime;
      const melody = [523,659,784,1047,784,1047,1319];
      melody.forEach((f, i) => {
        osc(f, 'sine', 0.15, 0.13 - i*0.01, t + i * 0.1);
      });
    },

    // Ambient: DNA lab hum — continuous
    startAmbient: function() {
      if (!enabled || ambientRunning) return;
      init(); resume();
      ambientRunning = true;

      const ambGain = ctx.createGain();
      ambGain.gain.value = 0.04;
      ambGain.connect(masterGain);

      // low hum
      const hum = ctx.createOscillator();
      hum.type = 'sine';
      hum.frequency.value = 55;
      hum.connect(ambGain);
      hum.start();

      // mid rumble
      const rumble = ctx.createOscillator();
      rumble.type = 'sine';
      rumble.frequency.value = 110;
      const rumbleGain = ctx.createGain();
      rumbleGain.gain.value = 0.025;
      rumble.connect(rumbleGain);
      rumbleGain.connect(masterGain);
      rumble.start();

      // subtle high frequency digital noise
      const bufSize = ctx.sampleRate * 2;
      const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
      const data = buf.getChannelData(0);
      for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1) * 0.3;
      const noiseSrc = ctx.createBufferSource();
      noiseSrc.buffer = buf;
      noiseSrc.loop = true;
      const noiseFilter = ctx.createBiquadFilter();
      noiseFilter.type = 'highpass';
      noiseFilter.frequency.value = 4000;
      const noiseGain = ctx.createGain();
      noiseGain.gain.value = 0.012;
      noiseSrc.connect(noiseFilter);
      noiseFilter.connect(noiseGain);
      noiseGain.connect(masterGain);
      noiseSrc.start();

      ambientNode = { hum, rumble, noiseSrc, ambGain, rumbleGain, noiseGain };
    },

    stopAmbient: function() {
      if (!ambientNode) return;
      try {
        ambientNode.hum.stop();
        ambientNode.rumble.stop();
        ambientNode.noiseSrc.stop();
      } catch(e) {}
      ambientRunning = false;
      ambientNode = null;
    },

    // tension sting — for decision moments
    tensionSting: function() {
      init(); resume();
      const t = ctx.currentTime;
      osc(55,  'sawtooth', 1.5, 0.10, t, 45);
      osc(110, 'sawtooth', 1.2, 0.07, t + 0.3, 90);
      osc(220, 'sine',     0.8, 0.05, t + 0.8);
      noise(0.6, 0.05, t + 1.0, 150);
    },

    // ending fanfare variant A (neutralize — somber)
    endingA: function() {
      init(); resume();
      const t = ctx.currentTime;
      const m = [220,196,174,165,147];
      m.forEach((f,i) => osc(f,'sine',0.6,0.12,t+i*0.4,f*0.85));
    },

    // ending fanfare variant B (contain — hopeful/uncertain)
    endingB: function() {
      init(); resume();
      const t = ctx.currentTime;
      osc(261,'sine',0.5,0.10,t);
      osc(329,'sine',0.5,0.10,t+0.3);
      osc(392,'sine',0.8,0.12,t+0.6);
      osc(329,'sine',0.5,0.08,t+1.1);
    },

    // ending fanfare variant C (communicate — ascending, wonder)
    endingC: function() {
      init(); resume();
      const t = ctx.currentTime;
      const m = [261,329,392,523,659,784,1047];
      m.forEach((f,i) => osc(f,'sine',0.4,0.10+i*0.008,t+i*0.25));
      noise(0.3,0.025,t+1.5,1500);
    },

    // hint revealed
    hintReveal: function() {
      init(); resume();
      const t = ctx.currentTime;
      osc(880,'sine',0.08,0.07,t);
      osc(1108,'sine',0.10,0.08,t+0.06);
      osc(1318,'sine',0.12,0.09,t+0.12);
    },

    // score bonus popup
    scoreBonus: function() {
      init(); resume();
      const t = ctx.currentTime;
      osc(660,'triangle',0.08,0.08,t);
      osc(880,'triangle',0.10,0.09,t+0.05);
    },
  };

  return {
    play: function(name) {
      if (!enabled) return;
      try { sounds[name] && sounds[name](); } catch(e) {}
    },
    startAmbient: function() {
      if (!enabled) return;
      try { sounds.startAmbient(); } catch(e) {}
    },
    stopAmbient: function() {
      try { sounds.stopAmbient(); } catch(e) {}
    },
    setEnabled: function(val) { enabled = val; },
    isEnabled: function() { return enabled; },
    init,
    resume,
  };
})();

const MAX_LIVES = 3;

function useMounted() {
  const ref = useRef(true);
  useEffect(() => () => { ref.current = false; }, []);
  return ref;
}


// ── AlertBar ─────────────────────────────────
function AlertBar({ type, msg }) {
  useEffect(() => {
    try {
      type === "danger"
        ? window.AudioEngine && window.AudioEngine.play("alertDanger")
        : window.AudioEngine && window.AudioEngine.play("alertInfo");
    } catch(e) {}
  }, [msg]);
  return <div className={"alert-bar alert-" + type}>{msg}</div>;
}

// ── Rich text parser ──────────────────────────
function parseNarrative(raw) {
  const PAUSES = ["(pausa)", "(pausa larga)", "(silencio largo)"];
  const SCENE_KW = /DESPUES|INTERIOR|SALA|NEGRO|LABORATORIO|ZONA|MONTAJE|HORAS|MESES/;
  const segs = [], lines = raw.split("\n");
  let i = 0;
  while (i < lines.length) {
    const line = lines[i], t = line.trim();
    if (!t)                                              { segs.push({type:"br"});           i++; continue; }
    if (PAUSES.includes(t))                              { segs.push({type:"pause"});        i++; continue; }
    if (/^\([^)]+\)$/.test(t))                           { segs.push({type:"stage",t});      i++; continue; }
    if (/^[A-Z0-9 \-\.]+$/.test(t) && t.length>6 && SCENE_KW.test(t)) { segs.push({type:"hdr",t}); i++; continue; }
    if (line.startsWith("  ") && /^[A-Z]/.test(t)) {
      const rows = [];
      while (i < lines.length && lines[i].startsWith("  ") && /^[A-Z]/.test(lines[i].trim())) {
        const r = lines[i].trim(), m = r.match(/^([^:]+):\s*(.+)$/);
        rows.push(m ? {label:m[1].trim(), value:m[2].trim()} : {label:r, value:null});
        i++;
      }
      if (rows.length) { segs.push({type:"data",rows}); continue; }
    }
    segs.push({type:"text",t:line}); i++;
  }
  return segs;
}
function PauseDots() {
  return (
    <span className="pause-dots">
      <span className="pd-dot" style={{animationDelay:"0s"}}>·</span>
      <span className="pd-dot" style={{animationDelay:"0.35s"}}>·</span>
      <span className="pd-dot" style={{animationDelay:"0.7s"}}>·</span>

  );
}
function RichText({ text }) {

  );
}

// ── DNA RAIN ──────────────────────────────────
function DnaCanvas() {
  const canvasRef = useRef(null);
  useEffect(() => {
    const c = canvasRef.current;
    const ctx = c.getContext("2d");
    c.width = window.innerWidth; c.height = window.innerHeight;
    const bases = ["A","T","G","C"];
    const colors = { A:"#00ff6a", T:"#ff2d55", G:"#60a5fa", C:"#ffb700" };
    const cols = Math.floor(c.width / 18);
    const drops = Array(cols).fill(1);
    let frame;
    const draw = () => {
      ctx.fillStyle = "rgba(2,13,8,0.05)";
      ctx.fillRect(0,0,c.width,c.height);
      ctx.font = "12px 'Share Tech Mono', monospace";
      drops.forEach((y,i) => {
        const b = bases[Math.floor(Math.random()*bases.length)];
        ctx.fillStyle = colors[b];
        ctx.fillText(b, i*18, y*18);
        if (y*18 > c.height && Math.random() > 0.975) drops[i] = 0;
        drops[i]++;
      });
      frame = requestAnimationFrame(draw);
    };
    draw();
    return () => cancelAnimationFrame(frame);
  }, []);
  return <canvas ref={canvasRef} className="dna-canvas" />;
}

// ── TYPEWRITER ────────────────────────────────
function useTypewriter(text, speed, onDone) {
  const [displayed, setDisplayed] = useState("");
  const [done, setDone] = useState(false);
  const skipRef = useRef(false);
  useEffect(() => {
    setDisplayed(""); setDone(false); skipRef.current = false;
    let i = 0;
    const iv = setInterval(() => {
      if (skipRef.current) {
        setDisplayed(text); setDone(true);
        clearInterval(iv); onDone && onDone(); return;
      }
      i++; setDisplayed(text.slice(0,i));
      if (i >= text.length) { setDone(true); clearInterval(iv); onDone && onDone(); }
    }, speed || 20);
    return () => clearInterval(iv);
  }, [text]);
  return { displayed, done, skip: () => { skipRef.current = true; } };
}

function NarrativeBox({ speaker, speakerClass, text, speed, onDone, children }) {
  const prevLen = useRef(0);
  const { displayed, done, skip } = useTypewriter(text, speed || 20, onDone);
  useEffect(() => {
    if (displayed.length > prevLen.current && displayed.length % 4 === 0)
      try { window.AudioEngine && window.AudioEngine.play("keyClick"); } catch(e) {}
    prevLen.current = displayed.length;
  }, [displayed]);
  const portrait = PORTRAIT_DATA[speakerClass];
  return (
    <div className={"narrative-box" + (portrait ? " has-portrait" : "")}
      onClick={!done ? skip : undefined}
      style={{cursor: done ? "default" : "pointer"}}>
      {portrait && <div className="portrait-wrap" dangerouslySetInnerHTML={{__html: portrait}} />}
      <div className="narrative-content">
        {speaker && <div className={`char-label ${speakerClass}`}>{speaker}</div>}
        <p className="narrative-text">
          {done ? <RichText text={text} /> : <>{displayed}<span className="cursor-blink" /></>}
        </p>
        {done && children}
      </div>
    </div>
  );
}

// ── COUNTDOWN TIMER ───────────────────────────
function CountdownTimer({ seconds, onExpire, paused }) {
  const [remaining, setRemaining] = useState(seconds);
  const mounted = useMounted();
  const expiredRef = useRef(false);

  useEffect(() => {
    if (paused) return;
    const iv = setInterval(() => {
      if (!mounted.current) { clearInterval(iv); return; }
      setRemaining(prev => {
        if (prev <= 1) {
          clearInterval(iv);
          if (!expiredRef.current) {
            expiredRef.current = true;
            setTimeout(() => { if (mounted.current) onExpire(); }, 0);
          }
          return 0;
        }
        return prev - 1;
      });
    }, 1000);
    return () => clearInterval(iv);
  }, [paused]);

  const pct = (remaining / seconds) * 100;
  const color = remaining > 30 ? "var(--glow2)" : remaining > 10 ? "var(--amber)" : "var(--red)";
  return (
    <div className="timer-wrap">
      <div className="timer-label" style={{color}}>⏱ {remaining}s</div>
      <div className="timer-bar-bg">
        <div className="timer-bar-fill" style={{width:`${pct}%`, background:color}} />
      </div>
    </div>
  );
}

// ── SEQUENCE DIFF RENDERER ────────────────────
function SeqDiff({ refSeq, mutSeq }) {
  const ref = refSeq.replace(/[\s]/g,"");
  const mut = mutSeq.replace(/[\s-]/g,"");
  const maxLen = Math.max(ref.length, mut.length);
  const refSpans = [], mutSpans = [];
  for (let i = 0; i < maxLen; i++) {
    const r = ref[i], m = mut[i];
    if (r === undefined) {
      refSpans.push(<span key={i} className="diff-gap">·</span>);
      mutSpans.push(<span key={i} className="base-inserted">{m}</span>);
    } else if (m === undefined) {
      refSpans.push(<span key={i} className="diff-deleted">{r}</span>);
      mutSpans.push(<span key={i} className="diff-gap">∅</span>);
    } else if (r !== m) {
      refSpans.push(<span key={i} className="diff-ref-changed">{r}</span>);
      mutSpans.push(<span key={i} className="diff-mut-changed">{m}</span>);
    } else {
      refSpans.push(<span key={i} className={`base-${r}`}>{r}</span>);
      mutSpans.push(<span key={i} className={`base-${m}`}>{m}</span>);
    }
  }
  return (
    <div className="seq-diff-block">
      <div className="seq-diff-row">
        <span className="seq-diff-tag">REF:</span>
        <span className="seq-diff-bases">{refSpans}</span>
      </div>
      <div className="seq-diff-row">
        <span className="seq-diff-tag">MUT:</span>
        <span className="seq-diff-bases">{mutSpans}</span>
      </div>
    </div>
  );
}

        reason: `Seleccionaste: "${d.question2.options[q2Answer]}". Correcto: "${d.question2.options[d.question2.correct]}"`,
        lesson: d.question2.explanation
      });
    } else {
      onScoreBonus(20, "+20 pts — tipo de mutación correcto");
    }
    setTimeout(() => { if (mounted.current) onComplete(); }, 1200);
  };

  return (
    <div className="minigame-wrapper">
      <div className="mg-header">
        <div className="mg-title">{d.title}</div>
      <div className="mg-objective">
        <div className="mg-objective-label">▶ TU OBJETIVO</div>
        <div className="mg-objective-text" dangerouslySetInnerHTML={{__html: "Traducí el ARNm e identificá la mutación que genera el <strong>codón de stop prematuro</strong>."}} />
        <div className="mg-objective-hint">Cada triplete de bases codifica un aminoácido. UAG, UAA y UGA detienen la traducción.</div>
      </div>
        <div className="mg-subtitle">{d.subtitle}</div>
        <div className="mg-lives-warning">{d.lives_warning}</div>
      </div>

      {/* Compact codon reference table */}

        {CODON_TABLE_ROWS.map((row, ri) => (
          <div key={ri} className="codon-grid-row">
            {row.map(([cod, aa]) => (
              <span key={cod} className={`cgc-pair ${aa==="STOP"?"stop-pair":""}`}>
                <span className="cgc-codon">{cod}</span>
                <span className="cgc-aa">{aa}</span>
              </span>
            ))}
          </div>
        ))}
      </div>

      {/* mRNA comparison */}
      <div className="mg-section-label">◆ Comparación mRNA — original vs mutante:</div>
      <div className="mrna-compare">
        <div className="mrna-row">
          <span className="mrna-row-label">ORIGINAL</span>
          {d.original_mrna.split(" ").map((c,i) => (
            <span key={i} className="mrna-codon-chip">{c}</span>
          ))}
        </div>
        <div className="mrna-row">
          <span className="mrna-row-label">MUTANTE</span>
          {d.mutant_mrna.split(" ").map((c,i) => {
            const orig = d.original_mrna.split(" ")[i];
            const changed = c !== orig;
            return (
              <span key={i} className={`mrna-codon-chip ${changed?"mutated":""}`}>
                {c}
                {changed && <span className="mutation-marker">↑</span>}
              </span>

          })}
        </div>
      </div>

      {/* Animated protein chain */}
      <div className="mg-section-label">◆ Traducción progresiva de la secuencia MUTANTE:</div>
      <div className="protein-chain">
        {codons.map((codon, i) => {

          const isStop = aa === "STOP";
          const visible = i < revealedUpto;

            <div key={i} className={`aa-bead ${isStop?"stop-bead":""} ${!visible?"hidden-bead":""}`}>
              <div className="aa-codon">{codon}</div>
              <div className="aa-name">{isStop ? "■ STOP" : (aa || "?")}</div>
              {!isStop && i < codons.length-1 && !isStop && <div className="aa-link" />}

      </div>

      {/* Q1 */}
      <div className="mg-section-label">◆ {d.question1.text}</div>
      <HintBtn
        hint="Los 3 codones de stop son: UAA, UAG y UGA. Busca cuál de los codones de la secuencia mutante empieza con UA o UG y es diferente al original."
        onUse={() => onScoreBonus(-5, "Pista usada −5 pts")}
        disabled={q1Submitted}
      />
      <div className="codon-selector">
        {codons.map((codon, i) => {
          const aa = CODON_LOOKUP[codon];
          const isStop = aa === "STOP";
          return (
            <button key={i}
              className={`codon-select-btn ${isStop?"is-stop":""} ${q1Answer===i?"selected":""} ${q1Submitted && i===d.question1.correct_idx?"correct":""} ${q1Submitted && q1Answer===i && i!==d.question1.correct_idx?"wrong":""}`}
              onClick={() => !q1Submitted && setQ1Answer(i)}
              disabled={q1Submitted}
            >
              <span className="cs-codon">{codon}</span>

        })}
      </div>
      {q1Submitted && (
        <div className={q1Answer===d.question1.correct_idx?"alert-success":"alert-danger"} style={{fontSize:22,marginBottom:10}}>
          {d.question1.explanation}
        </div>
      )}
      {!q1Submitted && (
        <button className="action-btn" disabled={q1Answer===null} onClick={submitQ1}>

      {/* Q2 */}

        <div style={{marginTop:18,animation:"fade-in 0.4s ease forwards"}}>

          <div className="choices-container">

              <button key={i}
                className={`choice-btn ${q2Answer===i?"selected":""} ${q2Submitted && i===d.question2.correct?"correct":""} ${q2Submitted && q2Answer===i && i!==d.question2.correct?"wrong":""}`}
                onClick={() => !q2Submitted && setQ2Answer(i)}

              </button>
            ))}

          {!q2Submitted && <button className="action-btn" disabled={q2Answer===null} onClick={submitQ2} style={{marginTop:10}}>Clasificar mutación →</button>}
        </div>
      )}
    </div>
  );
}

// MG3 — PHYLOGENETIC TREE
// ══════════════════════════════════════════════
function PhyloMinigame({ onComplete, onLoseLive, onScoreBonus }) {
  const d = MG3_DATA;
  const mounted = useMounted();
  const [selected, setSelected] = useState(null);
  const [submitted, setSubmitted] = useState(false);
  const [q2Answer, setQ2Answer] = useState(null);
  const [q2Submitted, setQ2Submitted] = useState(false);
  const [phase, setPhase] = useState("tree");

  const submitTree = () => {
    if (!selected) return;
    setSubmitted(true);
    if (selected !== d.correct_pos) {
      onLoseLive({
        reason: d.explanation_wrong,
        lesson: "En filogenética: menor distancia = mayor cercanía evolutiva. Fila CG001: Bacteria 0.18, Archaea 0.74, Eukarya 0.83, Virus 0.94. El valor mínimo indica el dominio correcto."
      });
    } else {
      onScoreBonus(30, "+30 pts — ubicación filogenética correcta");
    }
    setTimeout(() => { if (mounted.current) setPhase("q2"); }, 1000);
  };

  const submitQ2 = () => {
    if (q2Answer === null) return;
    setQ2Submitted(true);
    if (q2Answer !== d.question2.correct) {
      onLoseLive({ reason: `Seleccionaste: "${d.question2.options[q2Answer]}"`, lesson: d.question2.explanation });
    } else {
      onScoreBonus(20, "+20 pts — interpretación correcta");
    }
    setTimeout(() => { if (mounted.current) onComplete(); }, 1200);
  };

  // SVG cladogram layout
  const W = 500, H = 300;
  const xRoot = 40, xInternal = 100, xLeaf = 210, xLabel = 225, xPos = 370;
  const leaves = [
    { id:"bact",  label:"Bacteria",   y:55,  distIdx:0 },
    { id:"arch",  label:"Archaea",    y:115, distIdx:1 },
    { id:"euk",   label:"Eukarya",    y:175, distIdx:2 },
    { id:"virus", label:"Virus",      y:235, distIdx:3 },
  ];
  const positions = [
    { id:"pos_A", leafId:"bact",  label:"Posición A" },
    { id:"pos_B", leafId:"arch",  label:"Posición B" },
    { id:"pos_C", leafId:"euk",   label:"Posición C" },
  ];

  return (
    <div className="minigame-wrapper">
      <div className="mg-header">
        <div className="mg-title">{d.title}</div>
      <div className="mg-objective">
        <div className="mg-objective-label">▶ TU OBJETIVO</div>
        <div className="mg-objective-text" dangerouslySetInnerHTML={{__html: "Ubicá a CG-001 en el árbol filogenético usando la <strong>matriz de distancias genómicas</strong>."}} />
        <div className="mg-objective-hint">El valor más bajo en la fila de CG-001 indica el organismo más cercano evolutivamente.</div>
      </div>
        <div className="mg-subtitle">{d.subtitle}</div>
        <div className="mg-lives-warning">{d.lives_warning}</div>
      </div>

      <div className="mg-section-label">◆ Matriz de distancias genómicas (fila CG001 resaltada):</div>
      <div className="distance-matrix">
        <table>
          <thead>
            <tr>
              <th>—</th>
              {d.organisms.map(o => <th key={o}>{o.replace(/_/g," ")}</th>)}
            </tr>
          </thead>
          <tbody>
            {d.matrix.map((row, i) => (
              <tr key={i} className={i===4 ? "cg-row" : ""}>
                <th className="dm-row-header">{d.organisms[i].replace(/_/g," ")}</th>
                {row.map((val, j) => (
                  <td key={j} className={`${val===0?"dm-self":""} ${val<0.3&&val>0?"dm-low":""} ${val>0.85?"dm-high":""} ${(i===4||j===4)&&val>0?"dm-highlight":""}`}>
                    {val.toFixed(2)}
                  </td>
                ))}
              </tr>
            ))}
          </tbody>
        </table>
      </div>
      <div className="dm-legend">
        <span style={{color:"var(--glow)"}}>■ &lt;0.30 cercano</span>
        <span style={{color:"var(--red)"}}>■ &gt;0.85 lejano</span>
        <span style={{color:"var(--amber)"}}>■ fila/col CG001</span>
      </div>

      <div className="mg-section-label">◆ Cladograma — haz clic donde ubicarías CG-001:</div>
      <HintBtn
        hint="Busca el valor más bajo en la fila 'AGENTE CG001'. Ese organismo es el más cercano evolutivamente. Ubica CG001 dentro de su dominio."
        onUse={() => onScoreBonus(-5, "Pista usada −5 pts")}
        disabled={submitted}
      />
      <div className="phylo-container">
        <svg viewBox={`0 0 ${W} ${H}`} style={{width:"100%", maxHeight:310, display:"block"}}>
          {/* LUCA root label */}
          <text x={xRoot} y={H/2+5} fill="var(--glow2)"
            style={{fontSize:20,fontFamily:"'Share Tech Mono',monospace",letterSpacing:2}}>
            LUCA
          </text>
          {/* Dashed root line */}
          <line x1={xRoot+32} y1={H/2} x2={xInternal} y2={H/2}
            stroke="rgba(15,61,30,0.6)" strokeWidth={1} strokeDasharray="4,3" />
          {/* Vertical backbone */}
          <line x1={xInternal} y1={leaves[0].y} x2={xInternal} y2={leaves[3].y}
            stroke="var(--border)" strokeWidth={2} />

          {leaves.map(leaf => {
            const dist = d.matrix[4][leaf.distIdx];
            const isClosest = dist === Math.min(...d.matrix[4].slice(0,4));
            return (
              <g key={leaf.id}>
                <line x1={xInternal} y1={leaf.y} x2={xLeaf} y2={leaf.y}
                  stroke={isClosest ? "rgba(0,196,83,0.4)" : "var(--border)"} strokeWidth={isClosest?2:1.5} />
                <circle cx={xLeaf} cy={leaf.y} r={8}
                  fill="rgba(7,26,16,0.95)"
                  stroke={isClosest ? "var(--glow2)" : "var(--border)"}
                  strokeWidth={isClosest?2:1.5}
                />
                <text x={xLabel} y={leaf.y+4} fill={isClosest?"var(--glow3)":"var(--text)"}
                  style={{fontSize:20,fontFamily:"'Share Tech Mono',monospace"}}>
                  {leaf.label}
                </text>
                <text x={xLabel+62} y={leaf.y+4}
                  fill={isClosest?"var(--glow)":"var(--muted)"}
                  style={{fontSize:18,fontFamily:"'Share Tech Mono',monospace",fontWeight:isClosest?"700":"300"}}>
                  d={dist.toFixed(2)}{isClosest?" ← min":""}
                </text>
              </g>
            );
          })}

          {positions.map(pos => {
            const parentLeaf = leaves.find(l => l.id === pos.leafId);
            if (!parentLeaf) return null;
            const isSel   = selected === pos.id;
            const isOk    = submitted && pos.id === d.correct_pos;
            const isBad   = submitted && isSel && pos.id !== d.correct_pos;
            return (
              <g key={pos.id} style={{cursor: submitted ? "default" : "pointer"}}
                onClick={() => !submitted && setSelected(pos.id)}>
                <line x1={xLeaf+10} y1={parentLeaf.y} x2={xPos} y2={parentLeaf.y}
                  stroke={isSel?"var(--amber)":isOk?"var(--glow)":"rgba(15,61,30,0.5)"}
                  strokeWidth={isSel||isOk?1.5:1} strokeDasharray={isSel||isOk?"":"3,2"} />
                <rect x={xPos} y={parentLeaf.y-17} width={100} height={32} rx={2}
                  fill={isOk?"rgba(0,255,106,0.1)":isBad?"rgba(255,45,85,0.1)":isSel?"rgba(255,183,0,0.07)":"rgba(7,26,16,0.85)"}
                  stroke={isOk?"var(--glow)":isBad?"var(--red)":isSel?"var(--amber)":"var(--border)"}
                  strokeWidth={isSel||isOk||isBad?1.5:1}
                />
                <text x={xPos+50} y={parentLeaf.y-4} fill={isOk?"var(--glow)":isBad?"var(--red)":isSel?"var(--amber)":"var(--purple)"}
                  textAnchor="middle" style={{fontSize:18,fontFamily:"'Orbitron',monospace",letterSpacing:1}}>
                  CG-001?
                </text>
                <text x={xPos+50} y={parentLeaf.y+10} fill={isSel?"var(--amber)":"var(--muted)"}
                  textAnchor="middle" style={{fontSize:16,fontFamily:"'Share Tech Mono',monospace"}}>
                  {pos.label}
                </text>
              </g>
            );
          })}
        </svg>
      </div>

      {submitted && (
        <div className={selected===d.correct_pos?"alert-success":"alert-danger"} style={{fontSize:22,marginBottom:10}}>
          {selected===d.correct_pos ? d.explanation_correct : d.explanation_wrong}
        </div>
      )}
      {!submitted && (
        <button className="action-btn" disabled={!selected} onClick={submitTree}>
          Ubicar CG-001 en el árbol →
        </button>
      )}

      {phase === "q2" && (
        <div style={{marginTop:18,animation:"fade-in 0.4s ease forwards"}}>
          <div className="mg-section-label">◆ {d.question2.text}</div>
          <div className="choices-container">
            {d.question2.options.map((opt,i) => (
              <button key={i}
                className={`choice-btn ${q2Answer===i?"selected":""} ${q2Submitted && i===d.question2.correct?"correct":""} ${q2Submitted && q2Answer===i && i!==d.question2.correct?"wrong":""}`}
                onClick={() => !q2Submitted && setQ2Answer(i)}
                disabled={q2Submitted}
              >
                <span className="choice-num">{String(i+1).padStart(2,"0")}</span>{opt}
              </button>
            ))}
          </div>
          {q2Submitted && <div className="alert-info" style={{marginTop:10,fontSize:22}}>{d.question2.explanation}</div>}
          {!q2Submitted && <button className="action-btn" disabled={q2Answer===null} onClick={submitQ2} style={{marginTop:10}}>Confirmar interpretación →</button>}
        </div>
      )}
    </div>
  );
}

// MG4 — MUTATION CLASSIFICATION (with timer)
// ══════════════════════════════════════════════
function MutationMinigame({ onComplete, onLoseLive, onScoreBonus }) {
  const d = MG4_DATA;
  const mounted = useMounted();
  const [answers, setAnswers] = useState({});
  const [submitted, setSubmitted] = useState({});
  const [timerPaused, setTimerPaused] = useState(false);
  const [currentPair, setCurrentPair] = useState(0);
  const allDone = d.pairs.every(p => submitted[p.id]);

  const handleTimerExpire = useCallback(() => {
    if (!mounted.current) return;
    const unanswered = d.pairs.filter(p => !submitted[p.id]);
    if (unanswered.length > 0) {
      setTimerPaused(true);
      const newSub = {};
      unanswered.forEach(p => { newSub[p.id] = true; });
      setSubmitted(prev => ({...prev, ...newSub}));
      onLoseLive({
        reason: `El tiempo se agotó con ${unanswered.length} mutación(es) sin clasificar.`,
        lesson: "En análisis de crisis: SNP = 1 base cambia; inserción = secuencia más larga; deleción = secuencia más corta; frameshift = inserción/deleción no múltiplo de 3."
      });
    }
  }, [submitted, d.pairs, onLoseLive, mounted]);

  useEffect(() => {
    if (allDone) {
      setTimerPaused(true);
      setTimeout(() => { if (mounted.current) onComplete(); }, 1500);
    }
  }, [allDone]);

  const submitPair = (pair) => {
    const ans = answers[pair.id];
    if (ans === undefined) return;
    setSubmitted(prev => ({...prev, [pair.id]: true}));
    setTimerPaused(true);
    if (ans !== pair.correct) {
      onLoseLive({
        reason: `Gen ${pair.id}: seleccionaste "${pair.options[ans]}". Correcto: "${pair.options[pair.correct]}"`,
        lesson: pair.explanation
      });
    } else {
      onScoreBonus(25, `+25 pts — mutación ${pair.id}/4 correcta`);
    }
    setTimeout(() => { if (mounted.current) { setTimerPaused(false); setCurrentPair(p => p+1); } }, 1400);
  };

  return (
    <div className="minigame-wrapper">
      <div className="mg-header">
        <div className="mg-title">{d.title}</div>
      <div className="mg-objective">
        <div className="mg-objective-label">▶ TU OBJETIVO</div>
        <div className="mg-objective-text" dangerouslySetInnerHTML={{__html: "Clasificá cada mutación para determinar cuáles son <strong>reversibles con CRISPR</strong>."}} />
        <div className="mg-objective-hint">Missense e in-frame pueden corregirse. Frameshifts son irreversibles con tecnología actual.</div>
      </div>
        <div className="mg-subtitle">{d.subtitle}</div>
        <div className="mg-lives-warning">{d.lives_warning}</div>
      </div>
      {!allDone && <CountdownTimer seconds={120} paused={timerPaused} onExpire={handleTimerExpire} />}
      <div className="mut-legend">
        <span><span className="diff-ref-changed">X</span>/<span className="diff-mut-changed">X</span> = sustitución SNP</span>
        <span><span className="base-inserted">X</span> = inserción</span>
        <span><span className="diff-deleted">X</span> = deleción</span>
        <span><span className="diff-gap">∅</span> = posición eliminada</span>
      </div>

      {d.pairs.map((pair, idx) => {
        const ans = answers[pair.id];
        const done = submitted[pair.id];
        const correct = done && ans === pair.correct;
        const isActive = idx === currentPair && !done;
        return (
          <div key={pair.id}
            className={`mut-pair ${done?(correct?"answered-correct":"answered-wrong"):""} ${isActive?"active-pair":""}`}
          >
            <div className="mut-pair-header">
              <div className="mut-pair-label">Gen {pair.id}/4 — {pair.gene}</div>
              {done && <span className={`mut-result-badge ${correct?"badge-ok":"badge-err"}`}>{correct?"✓ CORRECTO":"✗ ERROR"}</span>}
            </div>
            <div className="mut-context">{pair.context}</div>
            <SeqDiff refSeq={pair.ref} mutSeq={pair.mut} />
            <div className="mut-options">
              {pair.options.map((opt, i) => (
                <button key={i}
                  className={`mut-opt ${ans===i?"selected":""} ${done&&i===pair.correct?"correct":""} ${done&&ans===i&&i!==pair.correct?"wrong":""}`}
                  onClick={() => !done && setAnswers(prev => ({...prev, [pair.id]: i}))}
                  disabled={done}
                >{opt}</button>
              ))}
            </div>
            {!done && isActive && (
              <button className="action-btn" disabled={ans===undefined}
                onClick={() => submitPair(pair)} style={{marginTop:8,fontSize:18,padding:"6px 14px"}}>
                Clasificar →
              </button>
            )}
            {done && <div className={`mg-explanation ${correct?"ok":"err"}`}>{pair.explanation}</div>}
          </div>
        );
      })}
      {allDone && (
        <div className={d.pairs.filter(p=>submitted[p.id]&&answers[p.id]===p.correct).length >= d.pass_threshold ? "alert-success":"alert-warn"}
          style={{marginTop:12,fontSize:22}}>
          {`${d.pairs.filter(p=>submitted[p.id]&&answers[p.id]===p.correct).length}/${d.pairs.length} correctas — `}
          {d.pairs.filter(p=>submitted[p.id]&&answers[p.id]===p.correct).length >= d.pass_threshold
            ? "Análisis aprobado. Continuando misión."
            : "Análisis parcial. La misión continúa con datos incompletos."}
        </div>
      )}
    </div>
  );
}
